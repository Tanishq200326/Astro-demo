airflow:
  connections:
    - conn_id: snowflake_default
      conn_type: snowflake
      login: YOUR_SNOWFLAKE_USERNAME
      password: YOUR_SNOWFLAKE_PASSWORD
      schema: PUBLIC
      extra: |
        {
          "account": "mec74339.us-east-1",
          "warehouse": "COMPUTE_WH",
          "database": "YOUR_DATABASE_NAME",
          "role": "SYSADMIN"
        }
